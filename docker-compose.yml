services:
  mysql:
    image: mysql:8.0
    container_name: requester-mysql
    env_file: .env
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    container_name: requester-backend
    env_file: .env
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: requester-frontend
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - backend

volumes:
  mysql_data:
